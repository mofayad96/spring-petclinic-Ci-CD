apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: spring-petclinic
  namespace: argocd
spec:
  description: Spring PetClinic GitOps project
  sourceRepos:
    - https://github.com/mofayad96/spring-petclinic-Ci-CD.git
  destinations:
    - namespace: dev
      server: https://kubernetes.default.svc
    - namespace: staging
      server: https://kubernetes.default.svc
    - namespace: prod
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: Namespace
  namespaceResourceWhitelist:
    - group: '*'
      kind: ConfigMap
    - group: '*'
      kind: Deployment
    - group: '*'
      kind: Ingress
    - group: '*'
      kind: Secret
    - group: '*'
      kind: Service
    - group: apps
      kind: StatefulSet
    - group: networking.k8s.io
      kind: NetworkPolicy
    - group: policy
      kind: PodDisruptionBudget
    - group: autoscaling
      kind: HorizontalPodAutoscaler
    - group: argoproj.io
      kind: Rollout
