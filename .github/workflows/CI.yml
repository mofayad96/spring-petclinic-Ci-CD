permissions:
  id-token: write
  contents: read
name: ci workflow of springpetclinic
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build-and-test-code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: setup java jdk
        uses: actions/setup-java@v5.0.0
        with:
          java-version: 17
          distribution: temurin
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: build code using maven (skip tests)
        run: mvn clean install -DskipTests
      - name: Run Tests
        run: mvn test
        continue-on-error: true
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
        if: always()

  build-scan-push-docker-image:
    needs: build-and-test-code
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write  # Required for signing with cosign
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      
      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v3.11.1
      
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
     
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
     
      - name: Build and tag image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.multistage
          push: false
          load: true
          tags: |
            springpetclinic:latest
            springpetclinic:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Scan Docker image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: springpetclinic:${{ github.sha }}
          format: table
          severity: CRITICAL
          exit-code: 0
          output: trivy-report.txt
        continue-on-error: true
     
      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-petclinic
          path: ${{ github.workspace }}/trivy-report.txt
        if: always()
      
      - name: Tag and push to ECR
        id: push-to-ecr
        run: |
          ECR=184574354202.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/springpetclinic
          docker tag springpetclinic:${{ github.sha }} $ECR:${{ github.sha }}
          docker tag springpetclinic:${{ github.sha }} $ECR:latest
          docker push $ECR:${{ github.sha }}
          docker push $ECR:latest
          echo "ECR_IMAGE=$ECR:${{ github.sha }}" >> $GITHUB_OUTPUT
      
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.7.0
        with:
          cosign-release: 'v2.4.0'
      
      - name: Sign Docker image with Cosign (Keyless)
        run: |
          cosign sign --yes \
            --recursive \
            ${{ steps.push-to-ecr.outputs.ECR_IMAGE }}
        env:
          COSIGN_EXPERIMENTAL: true
      
      - name: Verify Cosign signature
        run: |
          cosign verify --yes \
            ${{ steps.push-to-ecr.outputs.ECR_IMAGE }} \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/\.github/workflows/.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com"
        env:
          COSIGN_EXPERIMENTAL: true
      
      - name: Notify Slack
        uses: slackapi/slack-github-action@v1.27.0
        if: always()
        with:
          payload: |
            {
              "text": "Build finished for *${{ github.repository }}* on branch *${{ github.ref_name }}* \nStatus: ${{ job.status }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}