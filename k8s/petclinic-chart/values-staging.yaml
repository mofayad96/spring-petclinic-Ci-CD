# Staging environment overrides
# Promoted manually from dev after verification

replicaCount: 2

image:
  tag: "8a5d19bd13dc639dbb259ddacf1f7cfb4b34d813"

# Staging uses moderate resources
resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 200m
    memory: 512Mi

# Autoscaling enabled in staging for load testing
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

ingress:
  hosts:
    - host: staging.petclinic.local
      path: /
      pathType: Prefix
