# Dev environment overrides
# CI automatically updates image.tag here on every push to main

replicaCount: 1

image:
  tag: "99ab9af3ab14bd82abb30835c61fc273309b7299"

# Dev uses fewer resources
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

mysqlResources:
  limits:
    cpu: 250m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# No autoscaling in dev
autoscaling:
  enabled: false
