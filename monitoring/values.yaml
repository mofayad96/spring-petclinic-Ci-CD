prometheus:
  prometheusSpec:
    # This allows Prometheus to find ServiceMonitors in any namespace with the label release=kube-prometheus-stack
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector:
      matchLabels:
        release: kube-prometheus-stack

grafana:
  adminPassword: "admin" 
  ingress:
    enabled: false
  persistence:
    enabled: false
    storageClassName: "gp2"
    size: 2Gi

alertmanager:
  enabled: true
  templateFiles: {}
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['job']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'null'
    receivers:
    - name: 'null'
