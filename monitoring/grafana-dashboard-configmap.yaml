apiVersion: v1
kind: ConfigMap
metadata:
  name: petclinic-grafana-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  petclinic-dashboard.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 0 }
                ]
              },
              "mappings": [
                { "options": { "0": { "text": "DOWN" }, "1": { "text": "UP" } }, "type": "value" }
              ]
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          },
          "title": "Application Status",
          "type": "stat",
          "targets": [
            { "expr": "up{job=\"petclinic-service\"}", "legendFormat": "{{pod}}", "refId": "A" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "textMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          },
          "title": "Request Rate (req/s)",
          "type": "stat",
          "targets": [
            { "expr": "sum(rate(http_server_requests_seconds_count{job=\"petclinic-service\"}[5m]))", "legendFormat": "Requests/sec", "refId": "A" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "textMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          },
          "title": "Avg Response Time",
          "type": "stat",
          "targets": [
            { "expr": "sum(rate(http_server_requests_seconds_sum{job=\"petclinic-service\"}[5m])) / sum(rate(http_server_requests_seconds_count{job=\"petclinic-service\"}[5m]))", "legendFormat": "Avg Latency", "refId": "A" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "id": 4,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "textMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          },
          "title": "Error Rate (5xx)",
          "type": "stat",
          "targets": [
            { "expr": "sum(rate(http_server_requests_seconds_count{job=\"petclinic-service\", status=~\"5..\"}[5m])) / sum(rate(http_server_requests_seconds_count{job=\"petclinic-service\"}[5m]))", "legendFormat": "Error %", "refId": "A" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "spanNulls": false,
                "showPoints": "auto",
                "pointSize": 5
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "id": 5,
          "options": { "tooltip": { "mode": "single" }, "legend": { "displayMode": "list", "placement": "bottom" } },
          "title": "HTTP Request Rate by Status Code",
          "type": "timeseries",
          "targets": [
            { "expr": "sum by (status) (rate(http_server_requests_seconds_count{job=\"petclinic-service\"}[5m]))", "legendFormat": "{{status}}", "refId": "A" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "spanNulls": false,
                "showPoints": "auto",
                "pointSize": 5
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "id": 6,
          "options": { "tooltip": { "mode": "single" }, "legend": { "displayMode": "list", "placement": "bottom" } },
          "title": "Response Time by Endpoint",
          "type": "timeseries",
          "targets": [
            { "expr": "sum by (uri) (rate(http_server_requests_seconds_sum{job=\"petclinic-service\", uri!~\"/actuator.*\"}[5m])) / sum by (uri) (rate(http_server_requests_seconds_count{job=\"petclinic-service\", uri!~\"/actuator.*\"}[5m]))", "legendFormat": "{{uri}}", "refId": "A" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "spanNulls": false,
                "showPoints": "auto",
                "pointSize": 5
              },
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "id": 7,
          "options": { "tooltip": { "mode": "single" }, "legend": { "displayMode": "list", "placement": "bottom" } },
          "title": "JVM Heap Memory Usage",
          "type": "timeseries",
          "targets": [
            { "expr": "jvm_memory_used_bytes{job=\"petclinic-service\", area=\"heap\"}", "legendFormat": "{{id}}", "refId": "A" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "spanNulls": false,
                "showPoints": "auto",
                "pointSize": 5
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "id": 8,
          "options": { "tooltip": { "mode": "single" }, "legend": { "displayMode": "list", "placement": "bottom" } },
          "title": "JVM Threads",
          "type": "timeseries",
          "targets": [
            { "expr": "jvm_threads_live_threads{job=\"petclinic-service\"}", "legendFormat": "Live Threads", "refId": "A" },
            { "expr": "jvm_threads_daemon_threads{job=\"petclinic-service\"}", "legendFormat": "Daemon Threads", "refId": "B" }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["petclinic", "spring-boot"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Spring PetClinic Dashboard",
      "uid": "petclinic-dashboard"
    }
